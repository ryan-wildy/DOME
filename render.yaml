services:
  - type: web
    name: dome-platform
    env: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_FILE
        value: data/dome-db.json
      - key: PAYMENT_MODE
        value: mock
      - key: ADMIN_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
